name: Daily Contributions

on:
  schedule:
    - cron: '0 0 * * *'  # triggers daily, but won't always commit
  workflow_dispatch:

permissions:
  contents: write

jobs:
  make-contribution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Random skip (contributes ~5 out of 7 days)
        id: should_run
        run: |
          RAND=$((RANDOM % 6))
          if [ $RAND -lt 2 ]; then
            echo "Skipping today"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Random delay (0–8 hours)
        if: steps.should_run.outputs.skip == 'false'
        run: |
          DELAY=$((RANDOM % 28800))
          echo "Sleeping for $DELAY seconds"
          sleep $DELAY

      - name: Make contribution
        if: steps.should_run.outputs.skip == 'false'
        run: echo "$(date)" >> README.md

      - name: Commit and push
        if: steps.should_run.outputs.skip == 'false'
        run: |
          git config user.name "oaldak01"
          git config user.email "sup2021@icloud.com"
          git add README.md
          git commit -m "Daily contribution"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
